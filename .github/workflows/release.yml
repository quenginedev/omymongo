name: Create Release Branch And Publish

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Semver bump type
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  id-token: write # Required for OIDC authentication to access secrets

jobs:
  release:
    name: Bump version, branch, and publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump package version
        id: bump
        run: |
          npm version "${{ github.event.inputs.bump }}" --no-git-tag-version
          NEW_VERSION="$(node -p "require('./package.json').version")"
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Create and push release branch
        id: release_branch
        run: |
          BRANCH_NAME="release/v${{ steps.bump.outputs.new_version }}"

          if git ls-remote --exit-code --heads origin "$BRANCH_NAME" > /dev/null; then
            echo "Release branch already exists on origin: $BRANCH_NAME"
            echo "Pick another version bump (or delete/merge the existing release branch first)."
            exit 1
          fi

          git switch -c "$BRANCH_NAME"
          git add package.json
          git commit -m "chore(release): bump version to v${{ steps.bump.outputs.new_version }}"
          git push --set-upstream origin "$BRANCH_NAME"
          echo "branch_name=$BRANCH_NAME" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        id: tag
        run: |
          TAG_NAME="v${{ steps.bump.outputs.new_version }}"
          git tag "$TAG_NAME"
          git push origin "$TAG_NAME"
          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag_name }}
          name: Release ${{ steps.tag.outputs.tag_name }}
          generate_release_notes: true

      - name: Publish to npm
        run: pnpm publish --access public --no-git-checks

      - name: Open PR to sync version back to main
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          base: main
          branch: ${{ steps.release_branch.outputs.branch_name }}
          title: "chore(release): merge ${{ steps.release_branch.outputs.branch_name }} into main"
          body: |
            This PR syncs the released version bump back to main.
            Released version: v${{ steps.bump.outputs.new_version }}
